<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  overflow: hidden;
  background: transparent;
}

:root {
  --bg:      #f8f9ff;
  --primary: rgba(43, 58, 140, 0.95);
  --muted:   rgba(43, 58, 140, 0.28);
  --border:  rgba(43, 58, 140, 0.18);
  --fill:    rgba(43, 58, 140, 0.05);
}

.drum-label {
  font-size: 0.75rem;
  color: var(--muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 5px;
  padding-left: 2px;
}

.drum-wrap {
  position: relative;
  height: 100px;
  border-radius: 12px;
  overflow: hidden;
  background: var(--fill);
  border: 1px solid var(--border);
  touch-action: none;
}

.drum-list {
  height: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 30px 0;
}
.drum-list::-webkit-scrollbar { display: none; }

.drum-item {
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  scroll-snap-align: center;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: color 0.1s, font-size 0.1s, font-weight 0.1s;
  user-select: none;
}
.drum-item.active {
  color: var(--primary);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.03em;
}

/* fade-out top & bottom */
.drum-wrap::before,
.drum-wrap::after {
  content: '';
  position: absolute; left: 0; right: 0;
  height: 34px;
  pointer-events: none;
  z-index: 2;
}
.drum-wrap::before { top: 0;    background: linear-gradient(to bottom, var(--bg) 10%, transparent 100%); }
.drum-wrap::after  { bottom: 0; background: linear-gradient(to top,   var(--bg) 10%, transparent 100%); }

/* selection indicator */
.drum-lines {
  position: absolute;
  left: 14px; right: 14px;
  top: calc(50% - 20px);
  height: 40px;
  border-top:    1.5px solid var(--border);
  border-bottom: 1.5px solid var(--border);
  border-radius: 3px;
  pointer-events: none;
  z-index: 3;
}
</style>
</head>
<body>
<div class="drum-label" id="lbl"></div>
<div class="drum-wrap">
  <div class="drum-lines"></div>
  <ul class="drum-list" id="list"></ul>
</div>

<script>
(function () {
  let opts = [], curVal = null, initialized = false, scrollTimer = null;

  function sendVal(v) {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: v },
      "*"
    );
  }

  function updateActive() {
    const list = document.getElementById("list");
    const idx = Math.round(list.scrollTop / 40);
    list.querySelectorAll(".drum-item").forEach((el, i) =>
      el.classList.toggle("active", i === idx)
    );
  }

  function applyTheme(theme) {
    if (!theme) return;
    const bg = theme.backgroundColor || "#f8f9ff";
    const root = document.documentElement;
    root.style.setProperty("--bg", bg);
    // derive muted/primary from Streamlit's primaryColor if provided
    if (theme.primaryColor) {
      root.style.setProperty("--primary", theme.primaryColor);
      root.style.setProperty("--muted", theme.primaryColor.replace(")", ", 0.28)").replace("rgb(", "rgba(").replace("#", "rgba(") || "rgba(43,58,140,0.28)");
    }
  }

  function build(newOpts, val) {
    const list = document.getElementById("list");

    // Rebuild DOM only when options change
    if (JSON.stringify(newOpts) !== JSON.stringify(opts)) {
      opts = newOpts;
      list.innerHTML = "";
      newOpts.forEach((opt) => {
        const li = document.createElement("li");
        li.className = "drum-item";
        li.textContent = opt;
        li.addEventListener("click", () => {
          const i = newOpts.indexOf(opt);
          list.scrollTo({ top: i * 40, behavior: "smooth" });
        });
        list.appendChild(li);
      });
    }

    // Scroll to value only on first render
    if (!initialized) {
      const idx = Math.max(0, newOpts.indexOf(val));
      list.scrollTop = idx * 40;
      curVal = val;
      initialized = true;
      updateActive();
    }

    // Attach scroll handler once
    list.onscroll = () => {
      updateActive();
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        const idx = Math.round(list.scrollTop / 40);
        const snapped = Math.max(0, Math.min(idx, opts.length - 1));
        list.scrollTo({ top: snapped * 40, behavior: "smooth" });
        const newVal = opts[snapped];
        if (newVal !== curVal) {
          curVal = newVal;
          sendVal(newVal);
        }
      }, 180);
    };
  }

  window.addEventListener("message", (e) => {
    if (e.data.type === "streamlit:render") {
      const a = e.data.args || {};
      document.getElementById("lbl").textContent = a.label || "";
      applyTheme(e.data.theme);
      build(a.options || [], a.value || "");
    }
  });

  // Signal ready
  window.parent.postMessage(
    { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
    "*"
  );
})();
</script>
</body>
</html>

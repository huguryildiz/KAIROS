<svg width="320" height="96" viewBox="0 0 320 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Course Timetabling">
  <defs>
    <linearGradient id="ct-grad" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Icon: a timetable grid with placed course blocks -->
  <g transform="translate(12 12)">
    <!-- card -->
    <rect x="0" y="0" width="72" height="72" rx="16" fill="url(#ct-grad)"/>

    <!-- grid lines -->
    <g stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="2" stroke-linecap="round">
      <line x1="14" y1="26" x2="58" y2="26"/>
      <line x1="14" y1="40" x2="58" y2="40"/>
      <line x1="14" y1="54" x2="58" y2="54"/>
      <line x1="28" y1="20" x2="28" y2="60"/>
      <line x1="44" y1="20" x2="44" y2="60"/>
    </g>

    <!-- placed course blocks (the scheduling decision) -->
    <rect x="16" y="28" width="10" height="10" rx="2.5" fill="#FFFFFF"/>
    <rect x="46" y="28" width="10" height="10" rx="2.5" fill="#FFFFFF" fill-opacity="0.65"/>
    <rect x="31" y="42" width="10" height="10" rx="2.5" fill="#FFFFFF" fill-opacity="0.65"/>
    <rect x="16" y="42" width="10" height="10" rx="2.5" fill="#FFFFFF" fill-opacity="0.4"/>
    <rect x="46" y="42" width="10" height="10" rx="2.5" fill="#FACC15"/>

    <!-- header dots = day columns -->
    <circle cx="21" cy="14" r="2.2" fill="#FFFFFF" fill-opacity="0.85"/>
    <circle cx="36" cy="14" r="2.2" fill="#FFFFFF" fill-opacity="0.85"/>
    <circle cx="51" cy="14" r="2.2" fill="#FFFFFF" fill-opacity="0.85"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(100 0)" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="0" y="44" font-size="26" font-weight="700" fill="#1E293B" letter-spacing="-0.5">Course</text>
    <text x="0" y="72" font-size="26" font-weight="700" fill="#4F46E5" letter-spacing="-0.5">Timetabling</text>
  </g>
</svg>

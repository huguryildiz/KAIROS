<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Course Timetabling icon">
  <defs>
    <linearGradient id="ct-grad" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="96" height="96" rx="22" fill="url(#ct-grad)"/>

  <!-- grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="2.5" stroke-linecap="round">
    <line x1="20" y1="36" x2="76" y2="36"/>
    <line x1="20" y1="54" x2="76" y2="54"/>
    <line x1="20" y1="72" x2="76" y2="72"/>
    <line x1="38" y1="28" x2="38" y2="80"/>
    <line x1="58" y1="28" x2="58" y2="80"/>
  </g>

  <!-- course blocks -->
  <rect x="22" y="38" width="13" height="13" rx="3" fill="#FFFFFF"/>
  <rect x="61" y="38" width="13" height="13" rx="3" fill="#FFFFFF" fill-opacity="0.6"/>
  <rect x="41" y="56" width="13" height="13" rx="3" fill="#FFFFFF" fill-opacity="0.6"/>
  <rect x="22" y="56" width="13" height="13" rx="3" fill="#FFFFFF" fill-opacity="0.38"/>
  <rect x="61" y="56" width="13" height="13" rx="3" fill="#FACC15"/>

  <!-- day-column dots -->
  <circle cx="28" cy="22" r="2.6" fill="#FFFFFF" fill-opacity="0.85"/>
  <circle cx="48" cy="22" r="2.6" fill="#FFFFFF" fill-opacity="0.85"/>
  <circle cx="68" cy="22" r="2.6" fill="#FFFFFF" fill-opacity="0.85"/>
</svg>
